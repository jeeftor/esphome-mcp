services:
  esphome-mcp:
    image: ghcr.io/jeeftor/esphome-mcp:latest
    container_name: esphome-mcp
    restart: unless-stopped
    ports:
      - "3333:3333"
    environment:
      ESPHOME_URL: "http://homeassistant.local:6052"
      # ESPHOME_PASSWORD: "your-dashboard-password"
      # ESPHOME_HA_ADDON: "true"
    command:
      - serve
      - --http-addr
      - 0.0.0.0:3333
